name: neuraloperator
channels:
  - pyrocko
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - jupyter
  - numpy=1.24.4
  - pandas=2.0.3
  - matplotlib=3.7.3
  - scipy=1.10.1
  - scikit-learn=1.3.2
  - scikit-optimize=0.9.0
  - h5py=3.10.0
  - sympy=1.12
  - pyrocko
  - pybullet=3.25
  - deepxde=1.9.3
