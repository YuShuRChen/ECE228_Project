    - torch==2.1.0
    - torchvision==0.16.0
    - torchaudio==2.1.0
    - jax==0.4.13
    - jaxlib==0.4.13
    # Original pip dependencies
    - cython==3.0.10
    - gridijkstra==0.1
    - imageio==2.35.1
    - lazy-loader==0.4
    - mesh-to-sdf==0.0.15
    - pqdict==1.4.0
    - pyglet==2.0.17
    - pykonal==0.4.1
    - pyopengl==3.1.0
    - pywavelets==1.4.1
    - scikit-fmm==2024.5.29
    - scikit-image==0.21.0
    - tifffile==2023.7.10
    - torch-summary==1.4.5
    - trimesh==4.4.9